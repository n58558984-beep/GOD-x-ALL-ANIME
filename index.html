<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOD x ANIME | FINAL FIX</title>
    <style>
        :root { --neon: #00ffcc; --pink: #ff00c8; }
        body, html { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

        .header { padding: 15px; background: #080808; border-bottom: 2px solid var(--neon); text-align: center; box-shadow: 0 0 15px var(--neon); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 24px; font-weight: 900; color: var(--neon); text-shadow: 0 0 10px var(--neon); }

        .player-box { width: 95%; max-width: 900px; margin: 20px auto; border-radius: 12px; overflow: hidden; background: #000; border: 1px solid #222; aspect-ratio: 16/9; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        .controls { text-align: center; margin: 10px; }
        .btn { background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 5px; transition: 0.3s; }
        .btn:hover { background: var(--neon); color: #000; }

        .grid-title { padding: 10px 20px; color: var(--pink); font-size: 14px; font-weight: bold; text-transform: uppercase; }
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(135px, 1fr)); gap: 15px; padding: 15px; }
        
        .card { background: #0a0a0a; border-radius: 10px; overflow: hidden; cursor: pointer; border: 1px solid #1a1a1a; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--neon); box-shadow: 0 5px 15px rgba(0,255,204,0.3); }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card-name { padding: 10px; font-size: 11px; text-align: center; font-weight: bold; }
        
        #status { text-align: center; color: var(--neon); font-size: 12px; font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="header"><div class="logo">GOD x ANIME</div></div>

<div class="player-box">
    <iframe id="video-frame" src="https://vidsrc.me/embed/anime?ani_id=jujutsu-kaisen&index=1" allowfullscreen></iframe>
</div>

<div id="status">SUMMONING: Jujutsu Kaisen</div>
<div class="controls">
    <button class="btn" onclick="changeServer('salt')">Server: AnimeSalt</button>
    <button class="btn" onclick="changeServer('vidsrc')">Server: VidSrc (Stable)</button>
</div>

<div class="grid-title">Summoned Animes</div>
<div class="anime-grid" id="grid"></div>

<script>
    let currentSlug = "jujutsu-kaisen";
    
    const list = [
        { name: "Jujutsu Kaisen", slug: "jujutsu-kaisen", img: "https://wallpapercave.com/wp/wp5263236.jpg" },
        { name: "Naruto Shippuden", slug: "naruto-shippuden", img: "https://images3.alphacoders.com/992/992011.jpg" },
        { name: "Solo Leveling", slug: "solo-leveling", img: "https://images.alphacoders.com/134/1345459.png" },
        { name: "Demon Slayer", slug: "demon-slayer-kimetsu-no-yaiba", img: "https://images7.alphacoders.com/101/1011153.jpg" }
    ];

    const grid = document.getElementById('grid');
    list.forEach(a => {
        grid.innerHTML += `
            <div class="card" onclick="loadAnime('${a.slug}', '${a.name}')">
                <img src="${a.img}" alt="${a.name}">
                <div class="card-name">${a.name}</div>
            </div>
        `;
    });

    function loadAnime(slug, name) {
        currentSlug = slug;
        document.getElementById('status').innerText = "SUMMONING: " + name;
        changeServer('vidsrc'); // Pehle stable load karega
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function changeServer(type) {
        const frame = document.getElementById('video-frame');
        if(type === 'salt') {
            frame.src = `https://animesalt.ac/embed/${currentSlug}-episode-1`;
        } else {
            frame.src = `https://vidsrc.me/embed/anime?ani_id=${currentSlug}&index=1`;
        }
    }
</script>
</body>
</html>
